<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bharatpur Bazar</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="logo-placeholder" style="background: white; color: var(--primary); width: 60px; height: 60px; display: flex; align-items:center; justify-content:center; border-radius: 12px; font-weight: 900;">BB</div>
        <div class="spinner" style="margin-top: 20px;"></div>
    </div>

    <header>
        <div class="logo-container">
            <img src="logoForceSmall.jpg" alt="Logo" id="logoImg" onerror="this.parentElement.innerHTML='<div style=\'font-weight:900; color:var(--primary); font-size:1.5rem\'>BB</div>'">
        </div>
        <div class="header-title">Bharatpur Bazar</div>
    </header>

    <div class="nav-sticky">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Search for products..." oninput="renderItems()">
        </div>
        <div id="tabBar" class="tabs">
            <button class="tab-btn active" onclick="switchType('All')">All</button>
            <button class="tab-btn" onclick="switchType('Grocery')">Grocery</button>
            <button class="tab-btn" onclick="switchType('Hotel')">Hotel</button>
        </div>
    </div>

    <main id="appBody">
        <div id="menuContent"></div>
    </main>

    <div class="bottom-bar">
        <div class="total-info" onclick="toggleDrawer('cartDrawer')">
            <div class="label">Payable Amount</div>
            <div class="val">Rs <span id="mainTotal">0.00</span></div>
        </div>
        <div class="action-icons">
            <div class="action-btn" onclick="toggleDrawer('historyDrawer')"><i class="fas fa-receipt"></i></div>
            <div class="action-btn" onclick="toggleDrawer('chatDrawer')">
                <i class="fas fa-comment-dots"></i>
                <div id="chatDot" class="badge" style="display:none; background:var(--accent);">!</div>
            </div>
            <div class="action-btn" style="background: var(--accent);" onclick="toggleDrawer('cartDrawer')">
                <i class="fas fa-shopping-basket"></i>
                <div id="cartBadge" class="badge">0</div>
            </div>
        </div>
    </div>

    <div id="overlay" class="overlay" onclick="closeAll()"></div>

    <!-- Basket Drawer -->
    <div id="cartDrawer" class="drawer">
        <div class="drawer-header"><h3>Your Basket</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer; font-size:1.1rem;">&times;</button></div>
        <div class="drawer-body" id="cartList"></div>
        <div class="drawer-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom:6px; font-weight:600;"><span>Subtotal</span><span id="cartSubtotal">Rs 0.00</span></div>
            <div style="display:flex; justify-content:space-between; margin-bottom:18px; color:var(--danger); font-weight:800; font-size:1.05rem;"><span>Delivery Charge</span><span id="cartDelivery">Rs 0.00</span></div>
            <button class="btn-add" style="background:var(--success); height: 52px; font-size:1.1rem;" onclick="checkRegistration()">PLACE ORDER NOW</button>
        </div>
    </div>

    <!-- Orders Drawer -->
    <div id="historyDrawer" class="drawer">
        <div class="drawer-header"><h3>My Orders</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer;">&times;</button></div>
        <div class="drawer-body" id="historyStream"></div>
        <div class="drawer-footer">
            <button class="btn-add" style="background:var(--danger); height:48px;" onclick="localStorage.clear(); location.reload();">LOGOUT / RESET</button>
        </div>
    </div>

    <!-- Registration -->
    <div id="regDrawer" class="drawer">
        <div class="drawer-header"><h3>Delivery Info</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer;">&times;</button></div>
        <div class="drawer-body">
            <div class="input-group"><label>Full Name</label><input type="text" id="regName" class="input-box" placeholder="Your name"></div>
            <div class="input-group"><label>Phone Number</label><input type="tel" id="regPhone" class="input-box" placeholder="98XXXXXXXX"></div>
            <div class="input-group"><label>Bharatpur Ward</label><select id="regWard" class="input-box"></select></div>
            <div class="input-group"><label>Nearest Chowk</label><input type="text" id="regChowk" class="input-box" placeholder="Landmark"></div>
        </div>
        <div class="drawer-footer"><button class="btn-add" style="height:52px;" onclick="saveReg()">SAVE DETAILS</button></div>
    </div>

    <!-- Payment Selection -->
    <div id="payDrawer" class="drawer">
        <div class="drawer-header"><h3>Payment Method</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer;">&times;</button></div>
        <div class="drawer-body">
            <div style="padding:16px; border:2px solid #f1f5f9; border-radius:18px; margin-bottom:12px; cursor:pointer; display:flex; align-items:center; gap:12px;" onclick="finalizeOrder('cod')">
                <div style="width:44px; height:44px; background:#eefdf4; color:var(--success); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.3rem;"><i class="fas fa-hand-holding-dollar"></i></div>
                <div><div style="font-weight:800;">Cash on Delivery</div><div style="font-size:0.75rem; color:var(--text-muted);">Pay at doorstep</div></div>
            </div>
            <div style="padding:16px; border:2px solid #f1f5f9; border-radius:18px; cursor:pointer; display:flex; align-items:center; gap:12px;" onclick="toggleDrawer('qrDrawer')">
                <div style="width:44px; height:44px; background:#eff6ff; color:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.3rem;"><i class="fas fa-qrcode"></i></div>
                <div><div style="font-weight:800;">Online (eSewa/QR)</div><div style="font-size:0.75rem; color:var(--text-muted);">Scan & pay now</div></div>
            </div>
        </div>
    </div>

    <!-- QR Payment -->
    <div id="qrDrawer" class="drawer">
        <div class="drawer-header"><h3>Scan to Pay</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer;">&times;</button></div>
        <div class="drawer-body" style="text-align:center;">
            <div id="qrTarget" style="margin: 0 auto 15px; padding: 15px; background:white; border:3px dashed #e2e8f0; display:inline-block; border-radius:20px;">
                <img src="qr-payment.jpg" alt="Payment QR Code" style="width:200px; max-width:100%; height:auto; display:block; margin:0 auto; border-radius:12px;">
            </div>
            <div style="font-size:1.6rem; font-weight:900; color:var(--accent); margin-bottom:4px;">Rs <span id="qrAmount">0.00</span></div>
            <p style="font-size:0.8rem; color:var(--text-muted); font-weight:600;">Use your phone number in remarks for verification.</p>
        </div>
        <div class="drawer-footer"><button class="btn-add" style="background:var(--success); height:52px;" onclick="finalizeOrder('online')">I HAVE PAID</button></div>
    </div>

    <!-- Staff Support -->
    <div id="chatDrawer" class="drawer">
        <div class="drawer-header"><h3>Chat Support</h3><button onclick="closeAll()" style="border:none; background:#f1f5f9; width:36px; height:36px; border-radius:50%; cursor:pointer;">&times;</button></div>
        <div class="drawer-body" id="chatStream" style="display:flex; flex-direction:column; gap:10px; background:#f8fafc; border-radius:20px; padding: 12px;"></div>
        <div class="drawer-footer">
            <div style="display:flex; gap:8px;">
                <input type="text" id="chatInput" class="input-box" style="margin:0" placeholder="Ask something...">
                <button class="btn-add" style="width:52px; margin:0; border-radius:14px;" onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-storage-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
